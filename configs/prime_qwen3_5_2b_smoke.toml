# Prime Hosted Training — SMOKE TEST.
# Goal: validate env push + train wiring with minimal cost (~$0.05–$0.20).
# Do NOT use for any real training conclusion.

name = "clbench-poker-qwen3.5-2b-smoke"
model = "Qwen/Qwen3.5-2B"

# Tiny budget — enough to surface env-side errors without burning tokens.
# rollouts_per_example=4 (not 2): GRPO computes advantage as
# (reward - group_mean) / group_std. With only 2 rollouts per prompt and
# an untrained base model, both rollouts often produce near-identical text
# → identical reward → std = 0 → all advantages 0 → Prime's zero_advantage
# filter rejects the batch and the orchestrator crashes after 3 retries.
# 4 rollouts is the smallest group size where you reliably get variance.
max_steps = 2
batch_size = 4               # = rollouts_per_example: one prompt × 4 rollouts per step
rollouts_per_example = 4

# Optional knobs uncomment if needed:
# learning_rate = 1e-6
# lora_alpha = 16

[sampling]
max_tokens = 1024
temperature = 1.0
# Qwen3.5 is a thinking model — without this, output goes to reasoning_content
# and our env's content-only extractor sees empty strings → every turn looks
# like a parse failure even when the model is producing valid JSON. v0.1.5
# of the env reads both fields, so this flag is now belt-and-suspenders, but
# turning it off also cuts the per-token cost of the unused reasoning channel.
enable_thinking = false

# Constrained decoding — vLLM's guided_json passed through Prime's hosted
# inference pool via [sampling.extra_body]. The schema must match the env's
# response_schema. Generated from PokerAction.model_json_schema().
[sampling.extra_body.guided_json]
type = "object"
title = "PokerAction"
description = "Structured poker action response."
required = ["thinking", "action"]

[sampling.extra_body.guided_json.properties.thinking]
type = "string"
title = "Thinking"
description = "Your reasoning about the hand situation and why you chose this action"

[sampling.extra_body.guided_json.properties.action]
type = "string"
title = "Action"
description = "One of: FOLD, CALL, CHECK, RAISE"

[sampling.extra_body.guided_json.properties.amount]
title = "Amount"
description = "Raise amount (only required for RAISE); leave null otherwise"
anyOf = [{ type = "integer" }, { type = "null" }]

[[env]]
id = "sr-networks/clbench-poker"
# end_on_parse_failure = false: give the model up to `max_turns` chances to
# emit valid JSON within one rollout. The hard input-token cap prevents
# context-quadratic blowup. Multiple turns per rollout produces more
# variance across rollouts, helping GRPO escape zero-advantage at cold-start.
args = { max_instances_per_rollout = 1, max_turns = 8, max_input_tokens_per_rollout = 4000, end_on_parse_failure = false, task_kwargs = { num_instances = 2, opponent_policy = "calling_station", seed = 0 } }
