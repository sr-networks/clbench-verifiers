# Prime Hosted Training — Qwen3.5-2B on exploitable_poker WITH NOTEPAD.
#
# Notepad mode: 4 instances per rollout, persistent within-rollout memory.
# Tokens per rollout are roughly 4× plain mode → cost ~$5–$8 for 200 steps.
# Halve max_steps or rollouts_per_example to control the budget.

name = "clbench-poker-qwen3.5-2b-notepad"
model = "Qwen/Qwen3.5-2B"

max_steps = 100                # half-budget exploratory run
batch_size = 4                 # halved from plain config to keep token budget similar
rollouts_per_example = 4       # group size; 4 is enough with multi-instance rollouts
learning_rate = 1e-6
lora_alpha = 16

[sampling]
max_tokens = 1024
temperature = 1.0
# Qwen3.5 thinking-model channel routing — see prime_qwen3_5_2b.toml for the
# rationale. With notepad mode the policy is already structured-output-heavy,
# so a separate reasoning channel is doubly redundant.
enable_thinking = false

# Constrained decoding via vLLM guided_json. The schema below is the
# notepad-augmented PokerAction (the env adds an optional `notepad_update`
# field when use_notepad=true).
[sampling.extra_body.guided_json]
type = "object"
title = "PokerActionWithNotepad"
description = "Structured poker action with optional persistent notepad update."
required = ["thinking", "action"]

[sampling.extra_body.guided_json.properties.thinking]
type = "string"
title = "Thinking"
description = "Your reasoning about the hand situation and why you chose this action"

[sampling.extra_body.guided_json.properties.action]
type = "string"
title = "Action"
description = "One of: FOLD, CALL, CHECK, RAISE"

[sampling.extra_body.guided_json.properties.amount]
title = "Amount"
description = "Raise amount (only required for RAISE); leave null otherwise"
anyOf = [{ type = "integer" }, { type = "null" }]

[sampling.extra_body.guided_json.properties.notepad_update]
title = "Notepad update"
description = "Optional: full new contents of the persistent notepad (replaces previous). Leave null to keep notepad unchanged."
anyOf = [{ type = "string" }, { type = "null" }]

[[env]]
id = "sr-networks/clbench-poker"
# Notepad mode (CLBench `icl_notepad` semantics):
#   - clear_history_between_instances=true: at each instance boundary the
#     within-instance conversation history is wiped; the notepad is the
#     ONLY thing that survives. This forces the policy to actually use the
#     notepad rather than just relying on raw ICL across hands.
#   - final_instance_reward_weight=1.0, mean_instance_reward_weight=0.0:
#     reward = the last instance's outcome (in big blinds). All earlier
#     instance tokens (including notepad writes) get their advantage from
#     instance N's outcome — clean credit assignment for "did your notes
#     help the final hand?"
#   - max_turns=24 (4 hands × ~6 turns each) since history is wiped between
#     hands the per-instance context stays bounded.
args = { use_notepad = true, max_instances_per_rollout = 4, notepad_max_chars = 2000, max_turns = 24, max_input_tokens_per_rollout = 8000, end_on_parse_failure = false, clear_history_between_instances = true, mean_instance_reward_weight = 0.0, final_instance_reward_weight = 1.0, task_kwargs = { num_instances = 4, opponent_policy = "calling_station", seed = 0 } }

[val]
num_examples = 8
rollouts_per_example = 1
interval = 10

