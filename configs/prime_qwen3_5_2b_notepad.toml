# Prime Hosted Training — Qwen3.5-2B on exploitable_poker WITH NOTEPAD.
#
# Notepad mode: 4 instances per rollout, persistent within-rollout memory.
# Tokens per rollout are roughly 4× plain mode → cost ~$5–$8 for 200 steps.
# Halve max_steps or rollouts_per_example to control the budget.

name = "clbench-poker-qwen3.5-2b-notepad"
model = "Qwen/Qwen3.5-2B"

max_steps = 300                # 3x extension of the 100-step pilot — gives GRPO enough iterations
                                # to learn *what* useful notes look like, not just to fill the field
batch_size = 8                 # = rollouts_per_example; one distinct prompt × 8 rollouts
rollouts_per_example = 8       # group size up from 4 → tighter advantage estimates
learning_rate = 1e-5           # back to 1e-5 for the clean 2-hand memory test;
                                # 5e-5 was over-aggressive on multi-hand
lora_alpha = 16

[sampling]
max_tokens = 4096                # was 1024 — too short; the model truncated mid-`thinking`
temperature = 1.0
enable_thinking = false

# Constrained decoding via vLLM guided_json. Notepad-augmented PokerAction.
# `thinking` and `notepad_update` carry maxLength caps so the policy is
# forced to be terse — prevents the rambling that ate the 1024 budget.
[sampling.extra_body.guided_json]
type = "object"
title = "PokerActionWithNotepad"
description = "Structured poker action with persistent notepad update (required field; null allowed only mid-instance)."
required = ["thinking", "action", "notepad_update"]

[sampling.extra_body.guided_json.properties.thinking]
type = "string"
title = "Thinking"
description = "Brief reasoning (≤50 words). State the action and a one-sentence justification."
maxLength = 600

[sampling.extra_body.guided_json.properties.action]
type = "string"
title = "Action"
description = "One of: FOLD, CALL, CHECK, RAISE"

[sampling.extra_body.guided_json.properties.amount]
title = "Amount"
description = "Raise amount (only required for RAISE); leave null otherwise"
anyOf = [{ type = "integer" }, { type = "null" }]

[sampling.extra_body.guided_json.properties.notepad_update]
title = "Notepad update"
description = "Optional new full notepad content (≤100 words). Leave null to keep unchanged."
anyOf = [{ type = "string", maxLength = 800 }, { type = "null" }]

[[env]]
id = "sr-networks/clbench-poker"
# Notepad mode (CLBench `icl_notepad` semantics):
#   - clear_history_between_instances=true: at each instance boundary the
#     within-instance conversation history is wiped; the notepad is the
#     ONLY thing that survives. This forces the policy to actually use the
#     notepad rather than just relying on raw ICL across hands.
#   - final_instance_reward_weight=1.0, mean_instance_reward_weight=0.0:
#     reward = the last instance's outcome (in big blinds). All earlier
#     instance tokens (including notepad writes) get their advantage from
#     instance N's outcome — clean credit assignment for "did your notes
#     help the final hand?"
#   - max_turns=24 (4 hands × ~6 turns each) since history is wiped between
#     hands the per-instance context stays bounded.
args = { use_notepad = true, max_instances_per_rollout = 2, notepad_max_chars = 2000, max_turns = 32, max_input_tokens_per_rollout = 16000, end_on_parse_failure = false, clear_history_between_instances = true, mean_instance_reward_weight = 0.0, final_instance_reward_weight = 1.0, task_kwargs = { num_instances = 2, opponent_policy = "calling_station", seed = 0 } }

[val]
num_examples = 8
rollouts_per_example = 1
interval = 10

