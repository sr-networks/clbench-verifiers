# Prime Hosted Training — Qwen3.5-2B on exploitable_poker (plain GRPO).
#
# Cost estimate: ~$5–$15 for 200 steps × 8 rollouts × ~3-6 turns × bounded
# tokens. The smoke run on the same env converged at ~$0.04 / 2 steps; this
# scales with steps × rollouts × turn-length, which grows once the policy
# produces valid actions and full poker hands play out.
# Pricing source: `prime train models --output json` shows
# Qwen/Qwen3.5-2B at $0.15 per million training tokens.

name = "clbench-poker-qwen3.5-2b"
model = "Qwen/Qwen3.5-2B"

max_steps = 200
batch_size = 8                 # = num distinct prompts per step
rollouts_per_example = 8       # GRPO group size
learning_rate = 1e-6
lora_alpha = 16

[sampling]
max_tokens = 1024
temperature = 1.0
# Qwen3.5 is a thinking model — without this, output goes to reasoning_content
# and our env reads `content`. v0.1.5 of the env handles both fields, but
# turning thinking off is still cheaper (no separate reasoning channel) and
# matches the action-emission pattern at training and eval time.
enable_thinking = false

# Constrained decoding via vLLM guided_json. Smoke run zco930bwwpqgjd2cm3hxj80v
# confirmed parse_failure_penalty drops to 0 with this config and rollouts
# actually complete hands (num_instances_completed = 1.0).
[sampling.extra_body.guided_json]
type = "object"
title = "PokerAction"
description = "Structured poker action response."
required = ["thinking", "action"]

[sampling.extra_body.guided_json.properties.thinking]
type = "string"
title = "Thinking"
description = "Your reasoning about the hand situation and why you chose this action"

[sampling.extra_body.guided_json.properties.action]
type = "string"
title = "Action"
description = "One of: FOLD, CALL, CHECK, RAISE"

[sampling.extra_body.guided_json.properties.amount]
title = "Amount"
description = "Raise amount (only required for RAISE); leave null otherwise"
anyOf = [{ type = "integer" }, { type = "null" }]

[[env]]
id = "sr-networks/clbench-poker"
# Lessons baked in from the smoke runs:
#   - max_input_tokens_per_rollout is the right cost guard, NOT
#     end_on_parse_failure (that flag eliminates reward variance during
#     cold-start and makes GRPO's zero_advantage filter trip).
#   - Allow re-prompts so different rollouts in the same group naturally
#     diverge, giving GRPO advantage variance.
args = { max_instances_per_rollout = 1, max_turns = 12, max_input_tokens_per_rollout = 6000, end_on_parse_failure = false, task_kwargs = { num_instances = 5, opponent_policy = "calling_station", seed = 0 } }

# Optional: light validation every 10 steps.
[val]
num_examples = 8
rollouts_per_example = 1
interval = 10

# Optional: W&B logging — set in your env or uncomment.
# [wandb]
# project = "clbench-verifiers"
# name = "qwen3.5-2b-poker-plain"
