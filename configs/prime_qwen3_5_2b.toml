# Prime Hosted Training — Qwen3.5-2B on exploitable_poker (plain GRPO).
#
# Cost estimate: ~$1.20–$1.80 for 200 steps × 8 rollouts × ~5 turns × ~1k tokens.
# Pricing source: `prime train models --output json` shows
# Qwen/Qwen3.5-2B at $0.15 per million training tokens.

name = "clbench-poker-qwen3.5-2b"
model = "Qwen/Qwen3.5-2B"

max_steps = 200
batch_size = 8                 # = num distinct prompts per step
rollouts_per_example = 8       # GRPO group size
learning_rate = 1e-6
lora_alpha = 16

[sampling]
max_tokens = 1024
temperature = 1.0
# enable_thinking = false      # uncomment for non-reasoning rollouts

[[env]]
id = "sr-networks/clbench-poker"
# Cold-start defaults: hard caps on rollout length so the first ~50 steps
# (when the base model still emits unparseable text frequently) stay cheap.
# Raise max_turns to 16-32 and set end_on_parse_failure=false once the policy
# is producing valid JSON ≥90% of the time.
args = {
    max_instances_per_rollout = 1,
    max_turns = 12,
    max_input_tokens_per_rollout = 6000,
    end_on_parse_failure = true,
    task_kwargs = { num_instances = 5, opponent_policy = "calling_station", seed = 0 },
}

# Optional: light validation every 10 steps.
[val]
num_examples = 8
rollouts_per_example = 1
interval = 10

# Optional: W&B logging — set in your env or uncomment.
