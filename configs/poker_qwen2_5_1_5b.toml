# GRPO training config for Qwen2.5-1.5B-Instruct on exploitable_poker.
# Tuned to fit a single Colab A100-40GB with vLLM.
# Adjust gpu_memory_utilization down to ~0.30 for T4-16GB.

task_name = "exploitable_poker"
max_instances_per_rollout = 1
max_turns = 16
max_input_tokens_per_rollout = 8000
parse_failure_penalty = -1.0
end_on_parse_failure = true

[task_kwargs]
num_instances = 5            # short rollouts during training; eval uses default schedule
opponent_policy = "calling_station"
seed = 0

# Model
model_name = "Qwen/Qwen2.5-1.5B-Instruct"
use_lora = true
lora_r = 16
lora_alpha = 32
bf16 = true

# Training
output_dir = "./checkpoints/poker_qwen2_5_1_5b"
num_train_steps = 200
rollouts_per_step = 8
batch_size = 8
learning_rate = 1e-6
grad_accum = 1
warmup_steps = 5
save_every = 50
log_every = 1
max_prompt_tokens = 4096
max_completion_tokens = 1024

# vLLM
vllm_gpu_memory_utilization = 0.45
vllm_dtype = "bfloat16"
sampling_temperature = 1.0
sampling_top_p = 0.95
sampling_top_k = 50

# Logging
log_level = "INFO"
# wandb_project = "clbench-verifiers"
